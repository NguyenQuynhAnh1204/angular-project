<div class="date-label">
    <span class="material-symbols-outlined icon-chevron"
        (click)="previous()"
    >chevron_left</span>

    <div class="label-content" (click)="changeMode()">
        {{label}}
    </div>

    <span class="material-symbols-outlined icon-chevron"
        (click)="next()"
    >chevron_right</span>
</div>

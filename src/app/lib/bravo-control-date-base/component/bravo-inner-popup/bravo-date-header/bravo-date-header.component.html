<div class="date-label">
    <span class="material-symbols-outlined icon-chevron"
        (mousedown)="previous($event)"
    >chevron_left</span>

    <div class="label-content" (mousedown)="changeMode($event)">
        {{label}}
    </div>

    <span class="material-symbols-outlined icon-chevron"
        (mousedown)="next($event)"
    >chevron_right</span>
</div>

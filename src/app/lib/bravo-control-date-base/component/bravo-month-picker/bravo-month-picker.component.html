<div class="full-months" (mouseleave)="enableRange('month') && handleOnLeave()">
  @for (rows of months; track $index) {
    @for (item of rows; track $index) {
      <button
        class="btn-month"
        [class.selected]="isSelected(item)"
        [class.in-range]="isInRange(item)"
        [class.hover-range]="inHoverRange(item)"
        (click)="onSelectMonth(item)"
        (mouseenter)="enableRange('month') && handleOnHover(item)"
      >
        Tháng {{ item.getMonth() + 1 }}
      </button>
    }
  }
</div>

@if(!isRange) {
    <!-- date box -->
    <div class="single-date">
        <ng-container *ngTemplateOutlet="templateInner; context: { partType: 'start' }"/>
    </div>


} @else {
    <!-- date range -->
    <div class="date-range">
        <ng-container *ngTemplateOutlet="templateInner; context: { partType: 'start' }" />
        <ng-container *ngTemplateOutlet="templateInner; context: { partType: 'end' }" />
    </div>
}

<ng-template #templateInner let-partType="partType">
    <br-inner-popup
        [partType]="partType"
    />
</ng-template>

<p
    class="label"
    [class.have-text]="focus || textValue"
    [class.no-text]="textValue=='' && !focus"
>
    {{label}}: 
</p>
<input type="text" 
    class="input-under-line text-box"
    [readOnly]="readOnly"
    [value]="textValue" 
    (change)="handleOnChange($event)"
    (focus)="handleFocus()"
    (blur)="handleFocus()"
>
<p *ngIf="errors && control.touched" class="error">{{control.getError('required')?.message}}</p>
<p *ngIf="errors && control.value" class="error">{{control.getError('isNumber')?.message}}</p>

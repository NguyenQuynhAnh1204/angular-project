<p
    class="label"
    [class.have-text]="focus || textValue"
    [class.no-text]="textValue=='' && !focus"
>
    {{label || 'Tex box'}}: 
</p>
<input type="text" 
    class="input-under-line text-box"
    [class.is-focus]="focus"
    [readOnly]="readOnly"
    [value]="textValue" 
    (change)="handleOnChange($event)"
    (focus)="handleFocus()"
    (blur)="handleFocus()"
>

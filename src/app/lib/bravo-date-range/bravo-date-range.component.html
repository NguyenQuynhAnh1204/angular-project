<br-dropdown-base [visible]="isOpenDatePicker"
(onVisibleChanged)="openDatePicker($event)">
    <div class="date-input-container" 
        [class.is-focus]="focus"
        brDropdownAnchor>
        <p
            class="label"
            [class.have-text]="focus || textValue"
            [class.no-text]="textValue=='' && !focus"
        >
            {{label || 'Date'}}: 
        </p>
        
        <ng-container *ngTemplateOutlet="templateRangeInput; context: { partType: 'start', index:0 }" />
        <span class="material-symbols-outlined arrow-icon close-icon" [class.show-icon]="focus || textValue">
            east
        </span>
        <ng-container *ngTemplateOutlet="templateRangeInput; context: { partType: 'end', index:1 }" />

        <div class="date-icon-container">
            <span class="material-symbols-outlined close-icon" 
                [class.show-icon]='textValue'
                (mousedown)="handleOnClear($event)"
            >
                close
            </span>

            <span class="material-symbols-outlined calendar-icon"
                [class.select-date]="focus || textValue" 
                (mousedown)="showDatePicker($event)"
                >
                calendar_month
            </span>
        </div>
        
    </div>

    <div brDropdown>
        <br-date-popup
            [isRange]="true"
            [mode]="mode"
        />
    </div>
</br-dropdown-base>


<ng-template #templateRangeInput let-partType="partType" let-indx="index">
    <input type="text" 
        #rangePickerInput
        class="input-under-line date-box"
        [class.show-input]="focus || textValue"
        [placeholder]="getPlaceholder(partType)"
        [readOnly]="readOnly"
        [value]="inputValue[indx]"
        (mousedown)="onClickInputBox($event)"
        (input)="onInputChange($event)"
    >
</ng-template>

<br-dropdown-base 
[visible]="isOpenPicker" 
[isManualHandleOutsideClick]="true" 
(onOverlayOutsideClick)="hideDatePicker()"
>
    <div class="date-input-container"
        [class.is-focus]="focus"
        brDropdownAnchor
    >
       <div class="date-input-content">
         <p
            class="label"
            [class.have-text]="focus || textValue"
            [class.no-text]="textValue=='' && !focus"
        >
            {{label || 'Date range'}}: 
        </p>
        <input type="text" #startDateInput
            class="input-under-line date-range"
            [class.show-input]="focus || textValue"
            placeholder="Start date"
            [readOnly]="readOnly"
            [value]="startDate"
            (input)="handleOnChange('start', $event)"
            (focus)="handleOnFocusInput('start', startDateInput)"
            (blur)="handleOnBlurInput('start', startDateInput)"
        >
        <span class="material-symbols-outlined arrow-icon close-icon"
            [class.show-icon]="focus || textValue"
        >
            east
        </span>
        <input type="text" #endDateInput
            class="input-under-line date-range"
            [class.show-input]="focus || textValue"
            placeholder="End date"
            [readOnly]="readOnly"
            [value]="endDate"
            (input)="handleOnChange('end', $event)"
            (focus)="handleOnFocusInput('end', endDateInput)"
            (blur)="handleOnBlurInput('end', endDateInput)"
        >
        </div>
        <div class="date-icon-container">
            <span class="material-symbols-outlined close-icon"
                [class.show-icon]="focus || textValue" 
                (click)="clearSelectDate()"
            >close</span>
            <span class="material-symbols-outlined calendar-icon"
                [class.select-date]="focus || textValue" 
                (click)="showDatePicker()"
                >
                calendar_month
            </span>
        </div>
    </div>
    <div brDropdown>
        <br-date-range-container/>
    </div>
</br-dropdown-base>

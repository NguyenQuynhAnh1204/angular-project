<br-dropdown-base [visible]="isOpenDatePicker"
(onVisibleChanged)="openDatePicker($event)">
    <div class="date-input-container" 
        [class.is-focus]="focus"
        brDropdownAnchor>
        <p
            class="label"
            [class.have-text]="focus || !isEmptyValue(dateValue)"
            [class.no-text]="isEmptyValue(dateValue) && !focus"
        >
            {{label || 'Date'}}: 
        </p>
        
        
        <input type="text" 
            #rangePickerInput
            class="input-under-line date-box"
            [class.show-input]="focus || !isEmptyValue(dateValue)"
            [placeholder]="getPlaceholder('start')"
            [readOnly]="readOnly"
            [value]="displayValue(dateValue.start)"
            (mousedown)="onClickInputBox('start')"
            (input)="onInputChange($event)"
            >
            
            <span class="material-symbols-outlined arrow-icon close-icon" [class.show-icon]="focus || !isEmptyValue(dateValue)">
                east
            </span>
            
        <input type="text" 
        #rangePickerInput
        class="input-under-line date-box"
        [class.show-input]="focus || !isEmptyValue(dateValue)"
        [placeholder]="getPlaceholder('end')"
        [readOnly]="readOnly"
        [value]="displayValue(dateValue.end)"
        (mousedown)="onClickInputBox('end')"
            (input)="onInputChange($event)"
        >

        <div class="date-icon-container">
            <span class="material-symbols-outlined close-icon" 
                [class.show-icon]='!isEmptyValue(dateValue)'
                (mousedown)="handleOnClear($event)"
            >
                close
            </span>

            <span class="material-symbols-outlined calendar-icon"
                [class.select-date]="focus || !isEmptyValue(dateValue)" 
                (mousedown)="showDatePicker($event)"
                >
                calendar_month
            </span>
        </div>
        
    </div>

    <div brDropdown>
        <br-date-popup
            [isRange]="true"
            [mode]="mode"
        />
    </div>
</br-dropdown-base>

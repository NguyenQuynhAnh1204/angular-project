<div class="days">
    @for (item of days; track $index) {
        <span>{{item}}</span>
    }
</div>

<div class="dates" (mouseleave)="handleOnLeave()">
    @for (rows of dates; track $index) {
        @for (item of rows; track $index) {
            <button #dateItem
                class="btn-month"
                [class.not-month]="!moment.isSameMonth(item)"
                [class.today]="item.isToday()"
                [class.sunday]="item.isSunday()"
                [class.selected]="isStartDate(item) || isEndDate(item)"
                [class.range]="isRange(item)"
                [class.hover-range]="isHoverDate(item)"
                (click)="selectDate(item)"
                (mouseenter)="handleOnHover(item)"
            >
                {{ item.toDate().getDate() }}
            </button>
        }
    }
</div>

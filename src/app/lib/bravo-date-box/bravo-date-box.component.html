<br-dropdown-base [visible]="isOpenDate" [isManualHandleOutsideClick]="true" (onOverlayOutsideClick)="hideDatePicker()">
    <div class="date-input-container" 
            [class.is-focus]="focus"
            brDropdownAnchor>
            <p
                class="label"
                [class.have-text]="focus || textValue"
                [class.no-text]="textValue=='' && !focus"
            >
                {{label || 'Date'}}: 
            </p>
    
        @if (!isRange) {
            <input type="text" 
                #pickerInput
                class="input-under-line date-box"
                [class.show-input]="focus || textValue"
                [readOnly]="isOpenDate"
                [value]="textValue"
                [placeholder]="getPlaceholder()"
                (focus)="onFocus($event)"
                (focusout)="onFocusOut($event)"
                (click)="onClickInputBox($event)"
                (input)="onInputChange($event)"
            >
        } @else {
            <ng-container *ngTemplateOutlet="templateRangeInput; context: { partType: 'left' }" />
            
            <span class="material-symbols-outlined arrow-icon close-icon" [class.show-icon]="focus || textValue">
                east
            </span>

            <ng-container *ngTemplateOutlet="templateRangeInput; context: { partType: 'right' }" />
        }
        <div class="date-icon-container">
            <span class="material-symbols-outlined close-icon" 
            [class.show-icon]='textValue'
            (click)="handleOnClear()"
            >close</span>
            <span class="material-symbols-outlined calendar-icon"
                [class.select-date]="focus" 
                (click)="showDatePicker()"
                >
                calendar_month
            </span>
        </div>
    </div>

    <div brDropdown>
        <br-date-container 
            [isRange]="isRange"
        />
    </div>
</br-dropdown-base>


<ng-template #templateRangeInput let-partType="partType">
    <input type="text" 
        #rangePickerInput
        class="input-under-line date-box"
        [class.show-input]="focus || textValue"
        [placeholder]="getPlaceholder(partType)"
        [readOnly]="readOnly"
        (focus)="onFocus($event, partType)"
        (focusout)="onFocusOut($event)"
        (click)="onClickInputBox($event)"
        (input)="onInputChange($event)"
    >
</ng-template>

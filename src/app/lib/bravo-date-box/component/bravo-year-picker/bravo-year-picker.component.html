<div class="full-years">
  @for (rows of years; track $index) {
    @for (item of rows; track $index) {
      <button
        #monthItemRef
        class="btn-month"
        [class.selected]="item.getFullYear() == selectedYear"
        (click)="onSelectYear(item)"
      >
        {{ item.getFullYear() }}
      </button>
    }
  }
</div>

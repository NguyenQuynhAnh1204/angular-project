<div class="days">
    @for (item of days; track $index) {
        <span>{{item}}</span>
    }
</div>

<div class="dates">
    @for (rows of dates; track $index) {
        @for (item of rows; track $index) {
            <button
                class="btn-month"
                [class.disabled]="item.toDate().getMonth()!=moment.getMonth()"
                [class.today]="item.isToday()"
                [class.sunday]="item.isSunday()"
                [class.selected]="item.toDate().getDate() == selectedDate.toDate().getDate() && item.toDate().getMonth() == selectedDate.toDate().getMonth()"
                (click)="onSelectDate(item)"
            >
                {{ item.toDate().getDate() }}
            </button>
        }
    }
</div>

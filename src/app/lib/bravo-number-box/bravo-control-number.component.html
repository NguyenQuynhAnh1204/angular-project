<p
    class="label"
    [class.have-text]="focus || textValue"
    [class.no-text]="!textValue && !focus"
>
    {{label || 'Number'}}: 
</p>
<input
    class="input-under-line number-box"
    [class.is-focus]="focus"
    [readOnly]="readOnly"
    [value]="textValue" 
    (change)="handleOnChange($event)"
    (focus)="handleFocus()"
    (blur)="handleBlur()"
>

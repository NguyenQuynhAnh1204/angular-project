
<ng-template #templateLabel>
    <br-date-header
        [partType]="partType"
    />
</ng-template>


@switch(mode) {
@case('date') {
    <ng-container *ngTemplateOutlet="templateLabel"></ng-container>
    <br-date-picker
        [partType]="partType"
    />
}
@case ('month') {
    <ng-container *ngTemplateOutlet="templateLabel"></ng-container>
    <br-month-picker
       [partType]="partType"
    />
}
@case ('year') {
    <ng-container *ngTemplateOutlet="templateLabel"></ng-container>
    <br-year-picker
       [partType]="partType"
    />
}
@default {
    <ng-container *ngTemplateOutlet="templateLabel"></ng-container>
    <br-date-picker
        [partType]="partType"
    />
    }
}

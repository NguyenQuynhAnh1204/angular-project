<div class="full-years" (mouseleave)="enableRange('year') && handleOnLeave()">
  @for (rows of years; track $index) {
    @for (item of rows; track $index) {
      <button
        #monthItemRef
        class="btn-month"
        [class.selected]="isSelected(item)"
        [class.in-range]="isInRange(item)"
        [class.hover-range]="inHoverRange(item)"
        (mousedown)="onSelectYear($event, item)"
        (mouseenter)="enableRange('year') && handleOnHover(item)"
      >
        {{ item.getFullYear() }}
      </button>
    }
  }
</div>
